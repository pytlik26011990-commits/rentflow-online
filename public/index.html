<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RentFlow V9</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a2e;
      --panel2: #1a2340;
      --text: #eef4ff;
      --muted: #9fb0d0;
      --border: rgba(255,255,255,0.08);
      --accent: #5ea1ff;
      --green: #62d394;
      --red: #ff7272;
      --yellow: #ffd166;
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #0a0f1d 0%, #0f1730 100%);
      color: var(--text);
    }
    .app {
      display: grid;
      grid-template-columns: 270px 1fr;
      min-height: 100vh;
    }
    aside {
      background: rgba(10,15,29,.95);
      border-right: 1px solid var(--border);
      padding: 20px;
    }
    .brand { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .nav { display: grid; gap: 8px; }
    .nav button {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 14px;
      text-align: left;
      cursor: pointer;
    }
    .nav button.active, .nav button:hover { background: var(--panel2); }
    main { padding: 24px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .title h1 { margin: 0; font-size: 30px; }
    .title p { margin: 6px 0 0; color: var(--muted); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      border: none;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--accent), #7e8cff);
    }
    .btn.secondary { background: var(--panel); border: 1px solid var(--border); }
    .btn.green { background: linear-gradient(135deg, var(--green), #2db97c); }
    .btn.red { background: linear-gradient(135deg, var(--red), #f54646); }
    .btn.yellow { background: linear-gradient(135deg, #ffbe55, #ff8a47); }
    .btn.small { padding: 6px 10px; font-size: 12px; }
    .grid { display: grid; gap: 16px; }
    .cards { grid-template-columns: repeat(4, minmax(180px, 1fr)); }
    .two { grid-template-columns: 1.15fr 0.85fr; }
    .three-col { grid-template-columns: 1fr 1fr 1fr; }
    .card {
      background: rgba(19,26,46,.95);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }
    .metric { font-size: 30px; font-weight: 800; margin-top: 8px; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .panel-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .panel-title h3 { margin: 0; }
    input, select, textarea {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0d1428;
      color: var(--text);
    }
    textarea { min-height: 120px; resize: vertical; }
    .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .form-grid.three { grid-template-columns: repeat(3, 1fr); }
    .form-grid.two { grid-template-columns: repeat(2, 1fr); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--muted); }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .status-active { background: rgba(98,211,148,.14); color: #8ef0b1; }
    .status-pending { background: rgba(255,209,102,.16); color: #ffd166; }
    .status-overdue { background: rgba(255,114,114,.16); color: #ff9c9c; }
    .status-open { background: rgba(94,161,255,.16); color: #9fc7ff; }
    .status-closed { background: rgba(160,170,190,.16); color: #ced7ea; }
    .hidden { display: none !important; }
    .section { margin-top: 16px; }
    .notice {
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(102,227,196,.1);
      border: 1px solid rgba(102,227,196,.2);
    }
    .danger-box { background: rgba(255,114,114,.1); border-color: rgba(255,114,114,.2); }
    .warning-box { background: rgba(255,209,102,.1); border-color: rgba(255,209,102,.2); }
    canvas {
      width: 100%;
      height: 230px;
      background: #0d1428;
      border-radius: 14px;
    }
    .details-box {
      white-space: pre-wrap;
      background: #0d1428;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      min-height: 200px;
    }
    .inline-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .positive { color: #8ef0b1; }
    .negative { color: #ff9c9c; }
    @media (max-width: 1200px) {
      .cards, .two, .three-col, .form-grid, .form-grid.three, .form-grid.two {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 840px) {
      .app { grid-template-columns: 1fr; }
      .cards, .two, .three-col, .form-grid, .form-grid.three, .form-grid.two {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">RentFlow V9</div>
      <div class="sub">Indywidualne rozliczenia umów + kontrola mediów</div>
      <div class="nav" id="nav"></div>
    </aside>

    <main>
      <div class="topbar">
        <div class="title">
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle">Podgląd portfela najmu, płatności i mediów.</p>
        </div>
        <div class="actions">
          <button class="btn secondary" onclick="exportJSON()">Eksport JSON</button>
          <button class="btn secondary" onclick="exportCSVBundle()">Eksport CSV</button>
          <button class="btn yellow" onclick="importFile.click()">Import JSON</button>
          <button class="btn red" onclick="logout()">Wyloguj</button>
        </div>
      </div>

      <section id="dashboard" class="page"></section>
      <section id="properties" class="page hidden"></section>
      <section id="tenants" class="page hidden"></section>
      <section id="tenantCard" class="page hidden"></section>
      <section id="leases" class="page hidden"></section>
      <section id="meters" class="page hidden"></section>
      <section id="settlements" class="page hidden"></section>
      <section id="periodSettlements" class="page hidden"></section>
      <section id="payments" class="page hidden"></section>
      <section id="expenses" class="page hidden"></section>
      <section id="maintenance" class="page hidden"></section>
      <section id="reports" class="page hidden"></section>
      <section id="settings" class="page hidden"></section>
    </main>
  </div>

  <input type="file" id="importFile" accept="application/json" class="hidden" />

  <script>
    let state = {
      buildings: [],
      units: [],
      tenants: [],
      leases: [],
      meters: [],
      meterReadings: [],
      charges: [],
      payments: [],
      expenses: [],
      tickets: [],
      settlements: [],
      periodSettlements: [],
      settings: {
        companyName: "RentFlow V9",
        ownerName: "Zarządca",
        baseCurrency: "PLN",
        utilityVAT: 23,
        lateFee: 50,
        bankAccount: "",
        paymentDueDay: 10
      }
    };

    let selectedSettlementId = null;
    let selectedPeriodSettlementId = null;
    let selectedTenantCardId = null;
    let settlementPreviewLeaseId = "";

    const pages = [
      ["dashboard", "Dashboard", "Podgląd portfela najmu, płatności i mediów."],
      ["properties", "Budynki i lokale", "Zarządzanie budynkami i mieszkaniami."],
      ["tenants", "Najemcy", "Baza najemców i kontaktów."],
      ["tenantCard", "Karta najemcy", "Saldo, historia, rozliczenia i wpłaty."],
      ["leases", "Umowy", "Umowy najmu, opłaty stałe, media i terminy płatności."],
      ["meters", "Media", "Liczniki, odczyty, korekty i kontrola zużycia."],
      ["settlements", "Rozliczenia miesięczne", "Każda umowa osobno, z kontrolą brakujących mediów."],
      ["periodSettlements", "Rozliczenia okresowe", "Porównanie zaliczek z kosztami rzeczywistymi."],
      ["payments", "Opłaty i płatności", "Należności, wpłaty i zaległości."],
      ["expenses", "Koszty", "Koszty budynków i lokali."],
      ["maintenance", "Usterki", "Zgłoszenia, priorytety i statusy."],
      ["reports", "Raporty", "Obłożenie, wynik i zestawienia."],
      ["settings", "Ustawienia", "Dane firmy i eksporty."]
    ];

    const importFile = document.getElementById("importFile");

    function uid(prefix = "id") {
      return `${prefix}_${Math.random().toString(36).slice(2, 9)}`;
    }

    function today() { return new Date().toISOString().slice(0, 10); }
    function currentMonth() { return new Date().toISOString().slice(0, 7); }
    function monthStart(month) { return `${month}-01`; }
    function monthEnd(month) {
      const [y, m] = month.split("-").map(Number);
      return new Date(y, m, 0).toISOString().slice(0, 10);
    }
    function monthRange(from, to) {
      const arr = [];
      let [y, m] = from.split("-").map(Number);
      const [ty, tm] = to.split("-").map(Number);
      while (y < ty || (y === ty && m <= tm)) {
        arr.push(`${y}-${String(m).padStart(2, "0")}`);
        m++;
        if (m > 12) { m = 1; y++; }
      }
      return arr;
    }
    function dueDateForMonthByDay(month, dayInput) {
      const [y, m] = month.split("-").map(Number);
      const day = Math.max(1, Math.min(28, Number(dayInput || 10)));
      return new Date(y, m - 1, day).toISOString().slice(0, 10);
    }

    function fmt(n = 0) {
      return new Intl.NumberFormat("pl-PL", { style: "currency", currency: state.settings.baseCurrency || "PLN" }).format(Number(n || 0));
    }
    function fmtMonth(month) {
      const [y, m] = month.split("-");
      return `${m}.${y}`;
    }

    async function apiGet(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error("Błąd pobierania");
      return r.json();
    }
    async function apiPost(url, data) {
      const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
      if (!r.ok) throw new Error("Błąd zapisu");
      return r.json();
    }

    function normalizeState() {
      state.buildings ||= [];
      state.units ||= [];
      state.tenants ||= [];
      state.leases ||= [];
      state.meters ||= [];
      state.meterReadings ||= [];
      state.charges ||= [];
      state.payments ||= [];
      state.expenses ||= [];
      state.tickets ||= [];
      state.settlements ||= [];
      state.periodSettlements ||= [];
      state.settings ||= {};
      state.settings.companyName ||= "RentFlow V9";
      state.settings.ownerName ||= "";
      state.settings.baseCurrency ||= "PLN";
      state.settings.utilityVAT ||= 23;
      state.settings.lateFee ||= 50;
      state.settings.bankAccount ||= "";
      state.settings.paymentDueDay ||= 10;

      state.leases.forEach(l => {
        l.advanceColdWater ||= 0;
        l.advanceHotWater ||= 0;
        l.advanceElectricity ||= 0;
        l.advanceGas ||= 0;
        l.advanceHeat ||= 0;
        l.feeWaste ||= 0;
        l.feeInternet ||= 0;
        l.rentDueDay ||= 5;
        l.otherDueDay ||= 10;
      });
    }

    async function save() {
      normalizeState();
      await apiPost("/api/state", state);
      renderAll();
    }
    async function load() {
      state = await apiGet("/api/state");
      normalizeState();
    }
    async function logout() {
      await fetch("/api/logout", { method: "POST" });
      location.href = "/login";
    }

    function buildingName(id) { return state.buildings.find((b) => b.id === id)?.name || "—"; }
    function unitById(id) { return state.units.find(u => u.id === id); }
    function unitLabel(id) {
      const u = state.units.find((x) => x.id === id);
      return u ? `${buildingName(u.buildingId)} / lokal ${u.code}` : "—";
    }
    function tenantName(id) { return state.tenants.find((t) => t.id === id)?.name || "—"; }
    function tenantById(id) { return state.tenants.find((t) => t.id === id); }
    function leaseById(id) { return state.leases.find(l => l.id === id); }
    function leaseLabel(id) {
      const l = state.leases.find((x) => x.id === id);
      return l ? `${tenantName(l.tenantId)} — ${unitLabel(l.unitId)}` : "—";
    }
    function activeLeaseByUnit(unitId) { return state.leases.find((l) => l.unitId === unitId && l.status === "aktywna"); }
    function activeLeaseByTenant(tenantId) { return state.leases.find((l) => l.tenantId === tenantId && l.status === "aktywna"); }

    function chargePaidAmount(chargeId) {
      return state.payments.filter((p) => p.chargeId === chargeId).reduce((a, b) => a + Number(b.amount || 0), 0);
    }
    function calcChargeStatus(c) {
      const paid = chargePaidAmount(c.id);
      if (paid >= Number(c.amount)) return "opłacone";
      if (new Date(c.dueDate) < new Date(today())) return "zaległe";
      return "oczekujące";
    }
    function occupancyRate() {
      if (!state.units.length) return 0;
      return Math.round((state.units.filter((u) => u.status === "wynajęte").length / state.units.length) * 100);
    }
    function totals() {
      const due = state.charges.reduce((a, c) => a + Number(c.amount || 0), 0);
      const paid = state.payments.reduce((a, p) => a + Number(p.amount || 0), 0);
      const overdue = state.charges.filter((c) => calcChargeStatus(c) === "zaległe").reduce((a, c) => a + Math.max(0, Number(c.amount) - chargePaidAmount(c.id)), 0);
      const expenses = state.expenses.reduce((a, e) => a + Number(e.amount || 0), 0);
      return { due, paid, overdue, expenses, net: paid - expenses };
    }

    function meterUnitDefault(type) {
      if (type === "prąd") return "kWh";
      return "m³";
    }
    function readingsForMeter(meterId) {
      return state.meterReadings.filter((r) => r.meterId === meterId).sort((a, b) => (a.date + a.id).localeCompare(b.date + b.id));
    }
    function latestReadingOnOrBefore(meterId, date) {
      const all = readingsForMeter(meterId).filter((r) => r.date <= date);
      return all.length ? all[all.length - 1] : null;
    }
    function readingBefore(meterId, date) {
      const all = readingsForMeter(meterId).filter((r) => r.date < date);
      return all.length ? all[all.length - 1] : null;
    }
    function previousReadingOf(reading) {
      const all = readingsForMeter(reading.meterId);
      const idx = all.findIndex((r) => r.id === reading.id);
      if (idx <= 0) return null;
      return all[idx - 1];
    }
    function nextReadingOf(reading) {
      const all = readingsForMeter(reading.meterId);
      const idx = all.findIndex((r) => r.id === reading.id);
      if (idx < 0 || idx >= all.length - 1) return null;
      return all[idx + 1];
    }
    function meterConsumptionForMonth(meterId, month) {
      const meter = state.meters.find((m) => m.id === meterId);
      if (!meter) return null;

      const start = monthStart(month);
      const end = monthEnd(month);
      const startReading = readingBefore(meterId, start);
      const endReading = latestReadingOnOrBefore(meterId, end);

      if (!startReading || !endReading) {
        return { meter, usage: 0, amount: 0, startValue: startReading?.value ?? null, endValue: endReading?.value ?? null, ready: false };
      }

      const usage = Math.max(0, Number(endReading.value) - Number(startReading.value));
      const amount = usage * Number(meter.rate || 0);
      return { meter, usage, amount, startValue: startReading.value, endValue: endReading.value, ready: true };
    }
    function utilityBreakdownForUnit(unitId, month) {
      const meters = state.meters.filter((m) => m.unitId === unitId);
      return meters.map((m) => meterConsumptionForMonth(m.id, month));
    }

    function advanceKeyForType(type) {
      switch (type) {
        case "zimna woda": return "advanceColdWater";
        case "ciepła woda": return "advanceHotWater";
        case "prąd": return "advanceElectricity";
        case "gaz": return "advanceGas";
        case "ciepło": return "advanceHeat";
        default: return null;
      }
    }
    function leaseAdvanceTotal(lease) {
      return Number(lease.advanceColdWater || 0)
        + Number(lease.advanceHotWater || 0)
        + Number(lease.advanceElectricity || 0)
        + Number(lease.advanceGas || 0)
        + Number(lease.advanceHeat || 0);
    }
    function leaseFixedFeesTotal(lease) {
      return Number(lease.feeWaste || 0) + Number(lease.feeInternet || 0);
    }

    function getMissingMeterTypesForLeaseMonth(lease, month) {
      const meters = state.meters.filter(m => m.unitId === lease.unitId);
      const expectedTypes = meters.map(m => m.type);
      const missing = [];
      for (const meter of meters) {
        const result = meterConsumptionForMonth(meter.id, month);
        if (!result?.ready) missing.push(meter.type);
      }
      return [...new Set(missing)];
    }

    function buildMonthlySettlementDraft(lease, month) {
      const unit = unitById(lease.unitId);
      const tenant = tenantById(lease.tenantId);
      if (!unit || !tenant) return null;

      const lines = [];
      lines.push({ label: "Czynsz", qty: 1, unit: "mies.", rate: Number(lease.rent || 0), amount: Number(lease.rent || 0), group: "rent" });

      if (Number(unit?.serviceCharge || 0) > 0) {
        lines.push({ label: "Opłata administracyjna", qty: 1, unit: "mies.", rate: Number(unit.serviceCharge || 0), amount: Number(unit.serviceCharge || 0), group: "other" });
      }
      if (Number(lease.feeWaste || 0) > 0) {
        lines.push({ label: "Śmieci", qty: 1, unit: "mies.", rate: Number(lease.feeWaste || 0), amount: Number(lease.feeWaste || 0), group: "other" });
      }
      if (Number(lease.feeInternet || 0) > 0) {
        lines.push({ label: "Internet", qty: 1, unit: "mies.", rate: Number(lease.feeInternet || 0), amount: Number(lease.feeInternet || 0), group: "other" });
      }

      const advanceRows = [
        ["advanceColdWater", "Zaliczka zimna woda"],
        ["advanceHotWater", "Zaliczka ciepła woda"],
        ["advanceElectricity", "Zaliczka prąd"],
        ["advanceGas", "Zaliczka gaz"],
        ["advanceHeat", "Zaliczka ciepło"]
      ];
      advanceRows.forEach(([key, label]) => {
        if (Number(lease[key] || 0) > 0) {
          lines.push({ label, qty: 1, unit: "mies.", rate: Number(lease[key] || 0), amount: Number(lease[key] || 0), group: "other" });
        }
      });

      const utilityLines = utilityBreakdownForUnit(unit.id, month);
      utilityLines.forEach((u) => {
        if (!u || !u.meter || !u.ready) return;
        lines.push({
          label: `Rzeczywiste zużycie: ${u.meter.type}`,
          qty: u.usage,
          unit: u.meter.unit,
          rate: Number(u.meter.rate || 0),
          amount: Number((u.amount || 0).toFixed(2)),
          group: "other"
        });
      });

      const total = lines.reduce((a, b) => a + Number(b.amount || 0), 0);
      const missingTypes = getMissingMeterTypesForLeaseMonth(lease, month);

      return {
        month,
        leaseId: lease.id,
        tenantId: tenant.id,
        tenantName: tenant.name,
        unitId: unit.id,
        unitLabel: unitLabel(unit.id),
        dueDateRent: dueDateForMonthByDay(month, lease.rentDueDay || 5),
        dueDateOther: dueDateForMonthByDay(month, lease.otherDueDay || 10),
        bankAccount: state.settings.bankAccount || "",
        lines,
        total: Number(total.toFixed(2)),
        missingTypes,
        canGenerate: missingTypes.length === 0
      };
    }

    function tenantLedger(tenantId) {
      const lease = activeLeaseByTenant(tenantId) || state.leases.find(l => l.tenantId === tenantId);
      if (!lease) return { items: [], charges: 0, payments: 0, balance: 0 };

      const chargeItems = state.charges.filter(c => c.leaseId === lease.id).map(c => ({ date: c.dueDate, type: "Obciążenie", label: c.type, amount: Number(c.amount || 0) }));
      const paymentItems = state.payments.filter(p => p.leaseId === lease.id).map(p => ({ date: p.date, type: "Wpłata", label: p.method, amount: -Number(p.amount || 0) }));
      const settlementItems = state.periodSettlements.filter(s => s.tenantId === tenantId).map(s => ({ date: s.createdAt?.slice(0,10) || today(), type: "Rozliczenie okresowe", label: `${fmtMonth(s.fromMonth)} - ${fmtMonth(s.toMonth)}`, amount: Number(s.finalDifference || 0) }));

      const items = [...chargeItems, ...paymentItems, ...settlementItems].sort((a,b) => (a.date + a.type).localeCompare(b.date + b.type));
      const charges = chargeItems.reduce((a,b)=>a+b.amount,0) + settlementItems.reduce((a,b)=>a+b.amount,0);
      const payments = paymentItems.reduce((a,b)=>a+Math.abs(b.amount),0);
      const balance = charges - payments;
      return { items, charges, payments, balance };
    }

    function findSettlement(id) { return state.settlements.find((s) => s.id === id); }
    function findPeriodSettlement(id) { return state.periodSettlements.find((s) => s.id === id); }

    function settlementMessage(settlement) {
      const tenant = tenantById(settlement.tenantId);
      const name = tenant?.name || "Najemca";
      const lines = settlement.lines.map((l) => `- ${l.label}: ${fmt(l.amount)}`).join("\n");
      return `Dzień dobry ${name},\n\nprzesyłam rozliczenie za ${fmtMonth(settlement.month)} dla lokalu:\n${settlement.unitLabel}\n\nPozycje rozliczenia:\n${lines}\n\nRazem do zapłaty: ${fmt(settlement.total)}\nTermin płatności czynszu: ${settlement.dueDateRent || "—"}\nTermin płatności pozostałych opłat: ${settlement.dueDateOther || "—"}\n${settlement.bankAccount ? `Nr konta: ${settlement.bankAccount}` : ""}\n\nPozdrawiam\n${state.settings.ownerName || state.settings.companyName}`;
    }

    function periodSettlementMessage(settlement) {
      const tenant = tenantById(settlement.tenantId);
      const name = tenant?.name || "Najemca";

    async function generateSelectedSettlement() {
      const month = document.getElementById("settlement_month")?.value;
      const leaseId = document.getElementById("settlement_lease")?.value;
      if (!month || !leaseId) return alert("Wybierz miesiąc i umowę.");
      if (state.settlements.some(s => s.month === month && s.leaseId === leaseId)) {
        return alert("To rozliczenie już istnieje. Usuń je, jeśli chcesz wygenerować ponownie.");
      }
      const lease = leaseById(leaseId);
      if (!lease) return alert("Nie znaleziono umowy.");
      const draft = buildMonthlySettlementDraft(lease, month);
      if (!draft) return alert("Nie udało się przygotować rozliczenia.");
      if (!draft.canGenerate) return alert(`Brakuje odczytów dla: ${draft.missingTypes.join(', ')}`);

      state.settlements.push({ id: uid("st"), ...draft, createdAt: new Date().toISOString() });
      selectedSettlementId = state.settlements[state.settlements.length - 1].id;
      await save();
      showPage("settlements");
      alert("Wygenerowano rozliczenie dla wybranej umowy.");
    }

    function buildSettlementDetails(settlement) {
      const missing = settlement.missingTypes?.length ? `\nBRAKUJĄCE MEDIA: ${settlement.missingTypes.join(', ')}` : '';
      const lines = settlement.lines.map((line) => {
        const qty = line.qty !== undefined && line.qty !== null ? ` | ilość: ${line.qty}` : "";
        const unit = line.unit ? ` ${line.unit}` : "";
        const rate = line.rate ? ` | stawka: ${fmt(line.rate)}` : "";
        const group = line.group === "rent" ? " | termin: czynsz" : " | termin: pozostałe";
        return `${line.label}${qty}${unit}${rate}${group} | kwota: ${fmt(line.amount)}`;
      }).join("\n");

      return `Miesiąc: ${fmtMonth(settlement.month)}
Najemca: ${settlement.tenantName}
Lokal: ${settlement.unitLabel}
Termin płatności czynszu: ${settlement.dueDateRent || "—"}
Termin płatności pozostałych opłat: ${settlement.dueDateOther || "—"}
${settlement.bankAccount ? `Nr konta: ${settlement.bankAccount}` : ""}${missing}

Pozycje:
${lines}

Razem: ${fmt(settlement.total)}`;
    }

    async function addReading() {
      const meterId = document.getElementById("r_meter").value;
      const date = document.getElementById("r_date").value;
      const value = Number(document.getElementById("r_value").value || 0);
      if (!meterId || !date) return alert("Wybierz licznik i datę.");
      const error = validateReadingAgainstNeighbors(null, meterId, date, value);
      if (error) return alert(error);
      state.meterReadings.push({ id: uid("r"), meterId, date, value });
      await save();
    }
    function validateReadingAgainstNeighbors(readingId, meterId, date, value) {
      const temp = { id: readingId || "temp", meterId, date, value: Number(value) };
      const meterReadings = state.meterReadings.filter((r) => r.meterId === meterId && r.id !== readingId).concat(temp).sort((a, b) => (a.date + a.id).localeCompare(b.date + b.id));
      const idx = meterReadings.findIndex((r) => r.id === temp.id);
      const prev = idx > 0 ? meterReadings[idx - 1] : null;
      const next = idx < meterReadings.length - 1 ? meterReadings[idx + 1] : null;
      if (prev && Number(value) < Number(prev.value)) return `Stan nie może być mniejszy od poprzedniego odczytu (${prev.value} z ${prev.date}).`;
      if (next && Number(value) > Number(next.value)) return `Stan nie może być większy od następnego odczytu (${next.value} z ${next.date}).`;
      return null;
    }
    async function editReading(id) {
      const reading = state.meterReadings.find((r) => r.id === id);
      if (!reading) return;
      const newDate = prompt("Podaj nową datę odczytu (RRRR-MM-DD):", reading.date);
      if (!newDate) return;
      const newValueRaw = prompt("Podaj nowy stan licznika:", reading.value);
      if (newValueRaw === null) return;
      const newValue = Number(newValueRaw);
      if (Number.isNaN(newValue)) return alert("Stan licznika musi być liczbą.");
      const error = validateReadingAgainstNeighbors(id, reading.meterId, newDate, newValue);
      if (error) return alert(error);
      reading.date = newDate;
      reading.value = newValue;
      await save();
    }
    async function deleteReading(id) {
      const reading = state.meterReadings.find((r) => r.id === id);
      if (!reading) return;
      const next = nextReadingOf(reading);
      const prev = previousReadingOf(reading);
      if (next && prev && Number(next.value) < Number(prev.value)) return alert("Nie można usunąć tego odczytu, bo rozwali to kolejność stanów licznika.");
      if (!confirm("Usunąć odczyt licznika?")) return;
      state.meterReadings = state.meterReadings.filter((r) => r.id !== id);
      await save();
    }
    function selectSettlement(id) { selectedSettlementId = id; renderSettlements(); }
    async function deleteSettlement(id) {
      const s = findSettlement(id);
      if (!s) return;
      if (!confirm(`Usunąć rozliczenie ${fmtMonth(s.month)} dla ${s.tenantName}?`)) return;
      state.settlements = state.settlements.filter((x) => x.id !== id);
      if (selectedSettlementId === id) selectedSettlementId = null;
      await save();
    }
    function selectPeriodSettlement(id) { selectedPeriodSettlementId = id; renderPeriodSettlements(); }
    async function generatePeriodSettlement() {
      const leaseId = document.getElementById("ps_lease").value;
      const fromMonth = document.getElementById("ps_from").value;
      const toMonth = document.getElementById("ps_to").value;
      if (!leaseId || !fromMonth || !toMonth) return alert("Uzupełnij wszystkie pola.");
      if (fromMonth > toMonth) return alert("Miesiąc początkowy nie może być późniejszy od końcowego.");
      const lease = leaseById(leaseId);
      if (!lease) return alert("Nie znaleziono umowy.");
      const tenant = tenantById(lease.tenantId);
      const unit = unitById(lease.unitId);
      if (!tenant || !unit) return alert("Brak najemcy lub lokalu.");
      const months = monthRange(fromMonth, toMonth);
      const meterTypes = ["zimna woda", "ciepła woda", "prąd", "gaz", "ciepło"];
      const details = [];
      for (const type of meterTypes) {
        const key = advanceKeyForType(type);
        const monthlyAdvance = Number(lease[key] || 0);
        const advances = monthlyAdvance * months.length;
        const actual = months.reduce((sum, month) => {
          const unitLines = utilityBreakdownForUnit(unit.id, month);
          const matching = unitLines.filter(x => x?.meter?.type === type && x.ready);
          return sum + matching.reduce((a,b)=>a+Number(b.amount || 0),0);
        }, 0);
        if (advances !== 0 || actual !== 0) details.push({ type, label: type, actual: Number(actual.toFixed(2)), advances: Number(advances.toFixed(2)), difference: Number((actual - advances).toFixed(2)) });
      }
      const finalDifference = Number(details.reduce((a,b)=>a+Number(b.difference || 0),0).toFixed(2));
      const record = { id: uid("ps"), leaseId, tenantId: tenant.id, tenantName: tenant.name, unitId: unit.id, unitLabel: unitLabel(unit.id), fromMonth, toMonth, details, finalDifference, bankAccount: state.settings.bankAccount || "", createdAt: new Date().toISOString() };
      state.periodSettlements.push(record);
      selectedPeriodSettlementId = record.id;
      await save();
      showPage("periodSettlements");
      alert("Wygenerowano rozliczenie okresowe.");
    }
    async function deletePeriodSettlement(id) {
      const s = findPeriodSettlement(id);
      if (!s) return;
      if (!confirm(`Usunąć rozliczenie okresowe ${fmtMonth(s.fromMonth)} - ${fmtMonth(s.toMonth)}?`)) return;
      state.periodSettlements = state.periodSettlements.filter(x => x.id !== id);
      if (selectedPeriodSettlementId === id) selectedPeriodSettlementId = null;
      await save();
    }
    function copySettlementMessage() { const settlement = findSettlement(selectedSettlementId); if (!settlement) return; copyToClipboard(settlementMessage(settlement)); }
    function sendSettlementMail() { const settlement = findSettlement(selectedSettlementId); if (!settlement) return; const tenant = tenantById(settlement.tenantId); mailtoText(tenant?.email || "", `Rozliczenie najmu za ${fmtMonth(settlement.month)}`, settlementMessage(settlement)); }
    function printSettlement() { const settlement = findSettlement(selectedSettlementId); if (!settlement) return; openPrintWindow(settlementPrintableHtml(settlement)); }
    function copyPeriodSettlementMessage() { const settlement = findPeriodSettlement(selectedPeriodSettlementId); if (!settlement) return; copyToClipboard(periodSettlementMessage(settlement)); }
    function sendPeriodSettlementMail() { const settlement = findPeriodSettlement(selectedPeriodSettlementId); if (!settlement) return; const tenant = tenantById(settlement.tenantId); mailtoText(tenant?.email || "", `Rozliczenie okresowe mediów ${fmtMonth(settlement.fromMonth)} - ${fmtMonth(settlement.toMonth)}`, periodSettlementMessage(settlement)); }
    function printPeriodSettlement() { const settlement = findPeriodSettlement(selectedPeriodSettlementId); if (!settlement) return; openPrintWindow(periodSettlementPrintableHtml(settlement)); }
    async function addCharge() {
      const leaseId = document.getElementById("c_lease").value;

    async function removeCharge(id) {

      state.charges = state.charges.filter((x) => x.id !== id);

    async function addExpense() {

    async function addTicket() {

      await save();
    }
    async function removeTicket(id) {
      if (!confirm("Usunąć zgłoszenie?")) return;
      state.tickets = state.tickets.filter((x) => x.id !== id);
      await save();
    }

    async function generateMonthlyCharges() {
      const month = currentMonth();
      let created = 0;
      state.leases.filter((l) => l.status === "aktywna").forEach((l) => {
        const unit = unitById(l.unitId);
        const addIfMissing = (type, amount, dueDate) => {
          const exists = state.charges.some((c) => c.leaseId === l.id && c.type === type);
          if (!exists && Number(amount || 0) > 0) {
            state.charges.push({ id: uid("c"), leaseId: l.id, type, amount: Number(amount || 0), dueDate, status: "oczekujące", notes: "Automatycznie wygenerowano" });
            created++;
          }
        };
        addIfMissing(`Czynsz ${month}`, Number(l.rent || 0), dueDateForMonthByDay(month, l.rentDueDay || 5));
        addIfMissing(`Administracja ${month}`, Number(unit?.serviceCharge || 0), dueDateForMonthByDay(month, l.otherDueDay || 10));
        addIfMissing(`Śmieci ${month}`, Number(l.feeWaste || 0), dueDateForMonthByDay(month, l.otherDueDay || 10));
        addIfMissing(`Internet ${month}`, Number(l.feeInternet || 0), dueDateForMonthByDay(month, l.otherDueDay || 10));
        addIfMissing(`Zaliczka zimna woda ${month}`, Number(l.advanceColdWater || 0), dueDateForMonthByDay(month, l.otherDueDay || 10));
        addIfMissing(`Zaliczka ciepła woda ${month}`, Number(l.advanceHotWater || 0), dueDateForMonthByDay(month, l.otherDueDay || 10));
        addIfMissing(`Zaliczka prąd ${month}`, Number(l.advanceElectricity || 0), dueDateForMonthByDay(month, l.otherDueDay || 10));
        addIfMissing(`Zaliczka gaz ${month}`, Number(l.advanceGas || 0), dueDateForMonthByDay(month, l.otherDueDay || 10));
        addIfMissing(`Zaliczka ciepło ${month}`, Number(l.advanceHeat || 0), dueDateForMonthByDay(month, l.otherDueDay || 10));
      });
      await save();
      alert(`Wygenerowano ${created} opłat.`);
    }

    async function saveSettings() {
      state.settings.companyName = document.getElementById("s_company").value.trim();
      state.settings.ownerName = document.getElementById("s_owner").value.trim();
      state.settings.baseCurrency = document.getElementById("s_currency").value.trim() || "PLN";
      state.settings.utilityVAT = Number(document.getElementById("s_vat").value || 23);
      state.settings.lateFee = Number(document.getElementById("s_late").value || 50);
      state.settings.bankAccount = document.getElementById("s_bank").value.trim();
      state.settings.paymentDueDay = Number(document.getElementById("s_due").value || 10);
      await save();
      alert("Zapisano ustawienia.");

    function downloadFile(filename, content, mime) {
      const blob = new Blob([content], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
    function exportJSON() { downloadFile("rentflow_backup.json", JSON.stringify(state, null, 2), "application/json"); }
    function csv(rows) {
      if (!rows.length) return "";
      const headers = Object.keys(rows[0]);
      const esc = (v) => `"${String(v ?? "").replaceAll('"','""')}"`;
      return [headers.join(";"), ...rows.map(r => headers.map(h => esc(r[h])).join(";"))].join("\n");
    }
    function exportCSVBundle() {
      const files = {
        buildings: csv(state.buildings),
        units: csv(state.units),
        tenants: csv(state.tenants),
        leases: csv(state.leases),
        meters: csv(state.meters),
        readings: csv(state.meterReadings),
        settlements: csv(state.settlements),
        periodSettlements: csv(state.periodSettlements),
        charges: csv(state.charges),
        payments: csv(state.payments),
        expenses: csv(state.expenses),
        tickets: csv(state.tickets)
      };
      Object.entries(files).forEach(([name, content], i) => {
        setTimeout(() => downloadFile(`${name}.csv`, content, "text/csv;charset=utf-8;"), i * 250);
      });
    }

    importFile.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      try {
        state = JSON.parse(text);
        normalizeState();
        await save();
        alert("Import zakończony.");
      } catch {
        alert("Błędny plik JSON.");
      }
      e.target.value = "";
    });

    function drawCashflowChart() {
      const canvas = document.getElementById("cashflowChart");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.width = canvas.clientWidth;
      const h = canvas.height = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);

      const months = [];
      for (let i = 5; i >= 0; i--) {
        const d = new Date();
        d.setMonth(d.getMonth() - i);
        months.push(d.toISOString().slice(0, 7));
      }

      const income = months.map((m) => state.payments.filter((p) => p.date.startsWith(m)).reduce((a, b) => a + Number(b.amount || 0), 0));
      const costs = months.map((m) => state.expenses.filter((e) => e.date.startsWith(m)).reduce((a, b) => a + Number(b.amount || 0), 0));
      const max = Math.max(100, ...income, ...costs);
      const pad = 34;

      ctx.strokeStyle = "rgba(255,255,255,.10)";
      for (let i = 0; i < 5; i++) {
        const y = pad + ((h - pad * 2) / 4) * i;
        ctx.beginPath();
        ctx.moveTo(pad, y);
        ctx.lineTo(w - pad, y);
        ctx.stroke();
      }

      function drawSeries(arr, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        arr.forEach((v, i) => {
          const x = pad + i * ((w - pad * 2) / (arr.length - 1 || 1));
          const y = h - pad - (v / max) * (h - pad * 2);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
      }

      drawSeries(income, "#66e3c4");
      drawSeries(costs, "#ff7272");
      ctx.fillStyle = "#9fb0d0";
      ctx.font = "12px Arial";
      months.forEach((m, i) => {
        const x = pad + i * ((w - pad * 2) / (months.length - 1 || 1));
        ctx.fillText(m.slice(5), x - 8, h - 10);
      });
      ctx.fillStyle = "#66e3c4";
      ctx.fillText("Przychody", pad, 16);
      ctx.fillStyle = "#ff7272";
      ctx.fillText("Koszty", pad + 90, 16);
    }

      try {
        const me = await fetch("/api/me");
        if (!me.ok) {
          location.href = "/login";
          return;
        }
        renderNav();
        await load();
