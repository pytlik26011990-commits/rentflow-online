<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RentFlow V5</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a2e;
      --panel2: #1a2340;
      --text: #eef4ff;
      --muted: #9fb0d0;
      --border: rgba(255,255,255,0.08);
      --accent: #5ea1ff;
      --green: #62d394;
      --red: #ff7272;
      --yellow: #ffd166;
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #0a0f1d 0%, #0f1730 100%);
      color: var(--text);
    }
    .app {
      display: grid;
      grid-template-columns: 270px 1fr;
      min-height: 100vh;
    }
    aside {
      background: rgba(10,15,29,.95);
      border-right: 1px solid var(--border);
      padding: 20px;
    }
    .brand {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 20px;
    }
    .nav {
      display: grid;
      gap: 8px;
    }
    .nav button {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 14px;
      text-align: left;
      cursor: pointer;
    }
    .nav button.active,
    .nav button:hover {
      background: var(--panel2);
    }
    main {
      padding: 24px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .title h1 {
      margin: 0;
      font-size: 30px;
    }
    .title p {
      margin: 6px 0 0;
      color: var(--muted);
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--accent), #7e8cff);
    }
    .btn.secondary {
      background: var(--panel);
      border: 1px solid var(--border);
    }
    .btn.green {
      background: linear-gradient(135deg, var(--green), #2db97c);
    }
    .btn.red {
      background: linear-gradient(135deg, var(--red), #f54646);
    }
    .btn.yellow {
      background: linear-gradient(135deg, #ffbe55, #ff8a47);
    }
    .btn.small {
      padding: 6px 10px;
      font-size: 12px;
    }
    .grid {
      display: grid;
      gap: 16px;
    }
    .cards {
      grid-template-columns: repeat(4, minmax(180px, 1fr));
    }
    .two {
      grid-template-columns: 1.15fr 0.85fr;
    }
    .card {
      background: rgba(19,26,46,.95);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }
    .metric {
      font-size: 30px;
      font-weight: 800;
      margin-top: 8px;
    }
    .muted {
      color: var(--muted);
    }
    .small {
      font-size: 12px;
    }
    .panel-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }
    .panel-title h3 {
      margin: 0;
    }
    input, select, textarea {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0d1428;
      color: var(--text);
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .form-grid.three {
      grid-template-columns: repeat(3, 1fr);
    }
    .form-grid.two {
      grid-template-columns: repeat(2, 1fr);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .status-active { background: rgba(98,211,148,.14); color: #8ef0b1; }
    .status-pending { background: rgba(255,209,102,.16); color: #ffd166; }
    .status-overdue { background: rgba(255,114,114,.16); color: #ff9c9c; }
    .status-open { background: rgba(94,161,255,.16); color: #9fc7ff; }
    .status-closed { background: rgba(160,170,190,.16); color: #ced7ea; }
    .hidden { display: none !important; }
    .section { margin-top: 16px; }
    .notice {
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(102,227,196,.1);
      border: 1px solid rgba(102,227,196,.2);
    }
    .danger-box {
      background: rgba(255,114,114,.1);
      border-color: rgba(255,114,114,.2);
    }
    .warning-box {
      background: rgba(255,209,102,.1);
      border-color: rgba(255,209,102,.2);
    }
    canvas {
      width: 100%;
      height: 230px;
      background: #0d1428;
      border-radius: 14px;
    }
    .details-box {
      white-space: pre-wrap;
      background: #0d1428;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      min-height: 200px;
    }
    .right {
      text-align: right;
    }
    .inline-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    @media (max-width: 1200px) {
      .cards, .two, .form-grid, .form-grid.three, .form-grid.two {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 840px) {
      .app {
        grid-template-columns: 1fr;
      }
      .cards, .two, .form-grid, .form-grid.three, .form-grid.two {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">RentFlow V5</div>
      <div class="sub">Rozliczenia Pro + korekty</div>
      <div class="nav" id="nav"></div>
    </aside>

    <main>
      <div class="topbar">
        <div class="title">
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle">Podgląd portfela najmu, płatności i mediów.</p>
        </div>
        <div class="actions">
          <button class="btn secondary" onclick="exportJSON()">Eksport JSON</button>
          <button class="btn secondary" onclick="exportCSVBundle()">Eksport CSV</button>
          <button class="btn yellow" onclick="importFile.click()">Import JSON</button>
          <button class="btn red" onclick="logout()">Wyloguj</button>
        </div>
      </div>

      <section id="dashboard" class="page"></section>
      <section id="properties" class="page hidden"></section>
      <section id="tenants" class="page hidden"></section>
      <section id="leases" class="page hidden"></section>
      <section id="meters" class="page hidden"></section>
      <section id="settlements" class="page hidden"></section>
      <section id="payments" class="page hidden"></section>
      <section id="expenses" class="page hidden"></section>
      <section id="maintenance" class="page hidden"></section>
      <section id="reports" class="page hidden"></section>
      <section id="settings" class="page hidden"></section>
    </main>
  </div>

  <input type="file" id="importFile" accept="application/json" class="hidden" />

  <script>
    let state = {
      buildings: [],
      units: [],
      tenants: [],
      leases: [],
      meters: [],
      meterReadings: [],
      charges: [],
      payments: [],
      expenses: [],
      tickets: [],
      settlements: [],
      settings: {
        companyName: "RentFlow V5",
        ownerName: "Zarządca",
        baseCurrency: "PLN",
        utilityVAT: 23,
        lateFee: 50,
        bankAccount: "",
        paymentDueDay: 10
      }
    };

    let selectedSettlementId = null;

    const pages = [
      ["dashboard", "Dashboard", "Podgląd portfela najmu, płatności i mediów."],
      ["properties", "Budynki i lokale", "Zarządzanie budynkami i mieszkaniami."],
      ["tenants", "Najemcy", "Baza najemców i kontaktów."],
      ["leases", "Umowy", "Umowy najmu, czynsz i kaucje."],
      ["meters", "Media", "Liczniki, odczyty, korekty i rozliczenia zużycia."],
      ["settlements", "Rozliczenia", "Zamknięcie miesiąca, historia, cofanie i wiadomości dla najemców."],
      ["payments", "Opłaty i płatności", "Należności, wpłaty i zaległości."],
      ["expenses", "Koszty", "Koszty budynków i lokali."],
      ["maintenance", "Usterki", "Zgłoszenia, priorytety i statusy."],
      ["reports", "Raporty", "Obłożenie, wynik i zestawienia."],
      ["settings", "Ustawienia", "Dane firmy i eksporty."]
    ];

    const importFile = document.getElementById("importFile");

    function uid(prefix = "id") {
      return `${prefix}_${Math.random().toString(36).slice(2, 9)}`;
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function currentMonth() {
      return new Date().toISOString().slice(0, 7);
    }

    function monthStart(month) {
      return `${month}-01`;
    }

    function monthEnd(month) {
      const [y, m] = month.split("-").map(Number);
      return new Date(y, m, 0).toISOString().slice(0, 10);
    }

    function dueDateForMonth(month) {
      const [y, m] = month.split("-").map(Number);
      const day = Math.max(1, Math.min(28, Number(state.settings.paymentDueDay || 10)));
      return new Date(y, m - 1, day).toISOString().slice(0, 10);
    }

    function fmt(n = 0) {
      return new Intl.NumberFormat("pl-PL", {
        style: "currency",
        currency: state.settings.baseCurrency || "PLN"
      }).format(Number(n || 0));
    }

    function fmtMonth(month) {
      const [y, m] = month.split("-");
      return `${m}.${y}`;
    }

    async function apiGet(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error("Błąd pobierania");
      return r.json();
    }

    async function apiPost(url, data) {
      const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
      if (!r.ok) throw new Error("Błąd zapisu");
      return r.json();
    }

    function normalizeState() {
      state.buildings ||= [];
      state.units ||= [];
      state.tenants ||= [];
      state.leases ||= [];
      state.meters ||= [];
      state.meterReadings ||= [];
      state.charges ||= [];
      state.payments ||= [];
      state.expenses ||= [];
      state.tickets ||= [];
      state.settlements ||= [];
      state.settings ||= {};
      state.settings.companyName ||= "RentFlow V5";
      state.settings.ownerName ||= "";
      state.settings.baseCurrency ||= "PLN";
      state.settings.utilityVAT ||= 23;
      state.settings.lateFee ||= 50;
      state.settings.bankAccount ||= "";
      state.settings.paymentDueDay ||= 10;
    }

    async function save() {
      normalizeState();
      await apiPost("/api/state", state);
      renderAll();
    }

    async function load() {
      state = await apiGet("/api/state");
      normalizeState();
    }

    async function logout() {
      await fetch("/api/logout", { method: "POST" });
      location.href = "/login";
    }

    function buildingName(id) {
      return state.buildings.find((b) => b.id === id)?.name || "—";
    }

    function unitLabel(id) {
      const u = state.units.find((x) => x.id === id);
      return u ? `${buildingName(u.buildingId)} / lokal ${u.code}` : "—";
    }

    function tenantName(id) {
      return state.tenants.find((t) => t.id === id)?.name || "—";
    }

    function tenantById(id) {
      return state.tenants.find((t) => t.id === id);
    }

    function leaseLabel(id) {
      const l = state.leases.find((x) => x.id === id);
      return l ? `${tenantName(l.tenantId)} — ${unitLabel(l.unitId)}` : "—";
    }

    function activeLeaseByUnit(unitId) {
      return state.leases.find((l) => l.unitId === unitId && l.status === "aktywna");
    }

    function chargePaidAmount(chargeId) {
      return state.payments
        .filter((p) => p.chargeId === chargeId)
        .reduce((a, b) => a + Number(b.amount || 0), 0);
    }

    function calcChargeStatus(c) {
      const paid = chargePaidAmount(c.id);
      if (paid >= Number(c.amount)) return "opłacone";
      if (new Date(c.dueDate) < new Date(today())) return "zaległe";
      return "oczekujące";
    }

    function occupancyRate() {
      if (!state.units.length) return 0;
      return Math.round((state.units.filter((u) => u.status === "wynajęte").length / state.units.length) * 100);
    }

    function totals() {
      const due = state.charges.reduce((a, c) => a + Number(c.amount || 0), 0);
      const paid = state.payments.reduce((a, p) => a + Number(p.amount || 0), 0);
      const overdue = state.charges
        .filter((c) => calcChargeStatus(c) === "zaległe")
        .reduce((a, c) => a + Math.max(0, Number(c.amount) - chargePaidAmount(c.id)), 0);
      const expenses = state.expenses.reduce((a, e) => a + Number(e.amount || 0), 0);
      return { due, paid, overdue, expenses, net: paid - expenses };
    }

    function meterUnitDefault(type) {
      if (type === "prąd") return "kWh";
      return "m³";
    }

    function readingsForMeter(meterId) {
      return state.meterReadings
        .filter((r) => r.meterId === meterId)
        .sort((a, b) => (a.date + a.id).localeCompare(b.date + b.id));
    }

    function latestReadingOnOrBefore(meterId, date) {
      const all = readingsForMeter(meterId).filter((r) => r.date <= date);
      return all.length ? all[all.length - 1] : null;
    }

    function readingBefore(meterId, date) {
      const all = readingsForMeter(meterId).filter((r) => r.date < date);
      return all.length ? all[all.length - 1] : null;
    }

    function previousReadingOf(reading) {
      const all = readingsForMeter(reading.meterId);
      const idx = all.findIndex((r) => r.id === reading.id);
      if (idx <= 0) return null;
      return all[idx - 1];
    }

    function nextReadingOf(reading) {
      const all = readingsForMeter(reading.meterId);
      const idx = all.findIndex((r) => r.id === reading.id);
      if (idx < 0 || idx >= all.length - 1) return null;
      return all[idx + 1];
    }

    function meterConsumptionForMonth(meterId, month) {
      const meter = state.meters.find((m) => m.id === meterId);
      if (!meter) return null;

      const start = monthStart(month);
      const end = monthEnd(month);

      const startReading = readingBefore(meterId, start);
      const endReading = latestReadingOnOrBefore(meterId, end);

      if (!startReading || !endReading) {
        return {
          meter,
          usage: 0,
          amount: 0,
          startValue: startReading?.value ?? null,
          endValue: endReading?.value ?? null,
          ready: false
        };
      }

      const usage = Math.max(0, Number(endReading.value) - Number(startReading.value));
      const amount = usage * Number(meter.rate || 0);

      return {
        meter,
        usage,
        amount,
        startValue: startReading.value,
        endValue: endReading.value,
        ready: true
      };
    }

    function utilityBreakdownForUnit(unitId, month) {
      const meters = state.meters.filter((m) => m.unitId === unitId);
      return meters.map((m) => meterConsumptionForMonth(m.id, month));
    }

    function findSettlement(id) {
      return state.settlements.find((s) => s.id === id);
    }

    function settlementMessage(settlement) {
      const tenant = tenantById(settlement.tenantId);
      const name = tenant?.name || "Najemca";
      const lines = settlement.lines
        .map((l) => `- ${l.label}: ${fmt(l.amount)}`)
        .join("\n");

      return `Dzień dobry ${name},

przesyłam rozliczenie za ${fmtMonth(settlement.month)} dla lokalu:
${settlement.unitLabel}

Pozycje rozliczenia:
${lines}

Razem do zapłaty: ${fmt(settlement.total)}
Termin płatności: ${settlement.dueDate}
${settlement.bankAccount ? `Nr konta: ${settlement.bankAccount}` : ""}

Pozdrawiam
${state.settings.ownerName || state.settings.companyName}`;
    }

    function settlementPrintableHtml(settlement) {
      return `
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Rozliczenie ${settlement.month}</title>
<style>
body{font-family:Arial,sans-serif;padding:32px;color:#111}
h1{margin-bottom:4px}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #ccc;padding:10px;text-align:left}
th{background:#f2f2f2}
.right{text-align:right}
.box{margin-top:20px;padding:14px;border:1px solid #ddd}
</style>
</head>
<body>
<h1>Rozliczenie najmu</h1>
<div>${state.settings.companyName}</div>
<div>${state.settings.ownerName || ""}</div>

<div class="box">
<div><strong>Miesiąc:</strong> ${fmtMonth(settlement.month)}</div>
<div><strong>Najemca:</strong> ${settlement.tenantName}</div>
<div><strong>Lokal:</strong> ${settlement.unitLabel}</div>
<div><strong>Termin płatności:</strong> ${settlement.dueDate}</div>
${settlement.bankAccount ? `<div><strong>Nr konta:</strong> ${settlement.bankAccount}</div>` : ""}
</div>

<table>
<thead>
<tr><th>Pozycja</th><th>Ilość</th><th>Jednostka</th><th>Stawka</th><th class="right">Kwota</th></tr>
</thead>
<tbody>
${settlement.lines.map(line => `
<tr>
<td>${line.label}</td>
<td>${line.qty ?? ""}</td>
<td>${line.unit ?? ""}</td>
<td>${line.rate ? fmt(line.rate) : ""}</td>
<td class="right">${fmt(line.amount)}</td>
</tr>
`).join("")}
<tr>
<td colspan="4" class="right"><strong>Razem</strong></td>
<td class="right"><strong>${fmt(settlement.total)}</strong></td>
</tr>
</tbody>
</table>
</body>
</html>`;
    }

    function openPrintWindow(html) {
      const w = window.open("", "_blank", "width=900,height=700");
      w.document.open();
      w.document.write(html);
      w.document.close();
      w.focus();
      setTimeout(() => w.print(), 400);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text)
        .then(() => alert("Skopiowano wiadomość."))
        .catch(() => alert("Nie udało się skopiować."));
    }

    function mailtoForSettlement(settlement) {
      const tenant = tenantById(settlement.tenantId);
      const subject = encodeURIComponent(`Rozliczenie najmu za ${fmtMonth(settlement.month)}`);
      const body = encodeURIComponent(settlementMessage(settlement));
      const email = encodeURIComponent(tenant?.email || "");
      window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
    }

    function renderNav() {
      const nav = document.getElementById("nav");
      nav.innerHTML = pages
        .map(([id, label]) => `<button onclick="showPage('${id}')" id="nav_${id}">${label}</button>`)
        .join("");
    }

    function showPage(id) {
      pages.forEach(([pid, label, sub]) => {
        document.getElementById(pid).classList.toggle("hidden", pid !== id);
        document.getElementById("nav_" + pid).classList.toggle("active", pid === id);
        if (pid === id) {
          document.getElementById("pageTitle").textContent = label;
          document.getElementById("pageSubtitle").textContent = sub;
        }
      });
    }

    function renderDashboard() {
      const { due, paid, overdue, expenses, net } = totals();
      const openTickets = state.tickets.filter((t) => t.status !== "zamknięte").length;
      const utilityNow = state.meters.reduce((a, m) => {
        const latest = readingsForMeter(m.id);
        if (latest.length < 2) return a;
        const prev = latest[latest.length - 2];
        const curr = latest[latest.length - 1];
        return a + Math.max(0, Number(curr.value) - Number(prev.value)) * Number(m.rate || 0);
      }, 0);

      document.getElementById("dashboard").innerHTML = `
        <div class="grid cards">
          <div class="card"><div class="muted">Budynki</div><div class="metric">${state.buildings.length}</div></div>
          <div class="card"><div class="muted">Lokale</div><div class="metric">${state.units.length}</div><div class="small muted">Obłożenie ${occupancyRate()}%</div></div>
          <div class="card"><div class="muted">Należności</div><div class="metric">${fmt(due)}</div></div>
          <div class="card"><div class="muted">Wpłaty</div><div class="metric">${fmt(paid)}</div></div>
        </div>

        <div class="grid two section">
          <div class="card">
            <div class="panel-title"><h3>Szybki podgląd</h3></div>
            <div class="grid cards" style="grid-template-columns:repeat(2,1fr)">
              <div class="card"><div class="muted small">Zaległości</div><div class="metric" style="font-size:22px">${fmt(overdue)}</div></div>
              <div class="card"><div class="muted small">Koszty</div><div class="metric" style="font-size:22px">${fmt(expenses)}</div></div>
              <div class="card"><div class="muted small">Wynik netto</div><div class="metric" style="font-size:22px">${fmt(net)}</div></div>
              <div class="card"><div class="muted small">Media bieżące</div><div class="metric" style="font-size:22px">${fmt(utilityNow)}</div></div>
            </div>
            <div class="section"><canvas id="cashflowChart"></canvas></div>
          </div>
          <div class="card">
            <div class="panel-title"><h3>Zadania i alarmy</h3></div>
            <div class="notice ${overdue > 0 ? "danger-box" : ""}">
              ${overdue > 0 ? `Masz zaległości na ${fmt(overdue)}.` : "Brak przeterminowanych zaległości."}
            </div>
            <div class="section">
              <div class="card">Wolne lokale: <strong>${state.units.filter((u) => u.status === "wolne").length}</strong></div>
              <div class="card section">Otwarte usterki: <strong>${openTickets}</strong></div>
              <div class="card section">Rozliczenia zapisane: <strong>${state.settlements.length}</strong></div>
            </div>
          </div>
        </div>
      `;

      drawCashflowChart();
    }

    function renderProperties() {
      document.getElementById("properties").innerHTML = `
        <div class="card">

    function buildSettlementDetails(settlement) {
      const lines = settlement.lines
        .map((line) => {
          const qty = line.qty !== undefined && line.qty !== null ? ` | ilość: ${line.qty}` : "";
          const unit = line.unit ? ` ${line.unit}` : "";
          const rate = line.rate ? ` | stawka: ${fmt(line.rate)}` : "";
          return `${line.label}${qty}${unit}${rate} | kwota: ${fmt(line.amount)}`;
        })
        .join("\n");

      return `Miesiąc: ${fmtMonth(settlement.month)}
Najemca: ${settlement.tenantName}
Lokal: ${settlement.unitLabel}
Termin płatności: ${settlement.dueDate}
${settlement.bankAccount ? `Nr konta: ${settlement.bankAccount}` : ""}

Pozycje:
${lines}

Razem: ${fmt(settlement.total)}`;
    }

    function renderReports() {

        const income = state.payments.filter((p) => leaseIds.includes(p.leaseId)).reduce((a, b) => a + Number(b.amount || 0), 0);
        const expense = state.expenses.filter((e) => e.buildingId === b.id || leasedUnitIds.includes(e.unitId)).reduce((a, b) => a + Number(b.amount || 0), 0);

    function validateReadingAgainstNeighbors(readingId, meterId, date, value) {
      const current = readingId ? state.meterReadings.find((r) => r.id === readingId) : null;
      const temp = { id: readingId || "temp", meterId, date, value: Number(value) };
      const meterReadings = state.meterReadings
        .filter((r) => r.meterId === meterId && r.id !== readingId)
        .concat(temp)
        .sort((a, b) => (a.date + a.id).localeCompare(b.date + b.id));

      const idx = meterReadings.findIndex((r) => r.id === temp.id);
      const prev = idx > 0 ? meterReadings[idx - 1] : null;
      const next = idx < meterReadings.length - 1 ? meterReadings[idx + 1] : null;

      if (prev && Number(value) < Number(prev.value)) {
        return `Stan nie może być mniejszy od poprzedniego odczytu (${prev.value} z ${prev.date}).`;
      }

      if (next && Number(value) > Number(next.value)) {
        return `Stan nie może być większy od następnego odczytu (${next.value} z ${next.date}).`;
      }

      return null;
    }

    async function addReading() {
      const meterId = document.getElementById("r_meter").value;
      const date = document.getElementById("r_date").value;
      const value = Number(document.getElementById("r_value").value || 0);

      if (!meterId || !date) return alert("Wybierz licznik i datę.");

      const error = validateReadingAgainstNeighbors(null, meterId, date, value);
      if (error) return alert(error);

      state.meterReadings.push({
        id: uid("r"),
        meterId,
        date,
        value
      });

      await save();
    }

    async function editReading(id) {
      const reading = state.meterReadings.find((r) => r.id === id);
      if (!reading) return;

      const newDate = prompt("Podaj nową datę odczytu (RRRR-MM-DD):", reading.date);
      if (!newDate) return;

      const newValueRaw = prompt("Podaj nowy stan licznika:", reading.value);
      if (newValueRaw === null) return;

      const newValue = Number(newValueRaw);
      if (Number.isNaN(newValue)) return alert("Stan licznika musi być liczbą.");

      const error = validateReadingAgainstNeighbors(id, reading.meterId, newDate, newValue);
      if (error) return alert(error);

      reading.date = newDate;
      reading.value = newValue;
      await save();
    }

    async function deleteReading(id) {
      const reading = state.meterReadings.find((r) => r.id === id);
      if (!reading) return;

      const next = nextReadingOf(reading);
      const prev = previousReadingOf(reading);

      if (next && prev && Number(next.value) < Number(prev.value)) {
        return alert("Nie można usunąć tego odczytu, bo rozwali to kolejność stanów licznika.");
      }

      if (!confirm("Usunąć odczyt licznika?")) return;
      state.meterReadings = state.meterReadings.filter((r) => r.id !== id);
      await save();
    }

    function settlementExists(month, leaseId) {
      return state.settlements.some((s) => s.month === month && s.leaseId === leaseId);
    }

    async function closeMonth() {
      const month = document.getElementById("settlement_month").value;
      if (!month) return alert("Wybierz miesiąc.");

      const activeLeases = state.leases.filter((l) => l.status === "aktywna");
      if (!activeLeases.length) return alert("Brak aktywnych umów.");

      let created = 0;

      for (const lease of activeLeases) {
        if (settlementExists(month, lease.id)) continue;

        const unit = state.units.find((u) => u.id === lease.unitId);
        const tenant = state.tenants.find((t) => t.id === lease.tenantId);
        if (!unit || !tenant) continue;

        const lines = [];
        lines.push({
          label: "Czynsz",
          qty: 1,
          unit: "mies.",
          rate: Number(lease.rent || 0),
          amount: Number(lease.rent || 0)
        });

        if (Number(unit.serviceCharge || 0) > 0) {
          lines.push({
            label: "Opłata administracyjna",
            qty: 1,
            unit: "mies.",
            rate: Number(unit.serviceCharge || 0),
            amount: Number(unit.serviceCharge || 0)
          });
        }

        const utilityLines = utilityBreakdownForUnit(unit.id, month);
        utilityLines.forEach((u) => {
          if (!u || !u.meter) return;
          lines.push({
            label: u.meter.type,
            qty: u.usage,
            unit: u.meter.unit,
            rate: Number(u.meter.rate || 0),
            amount: Number((u.amount || 0).toFixed(2))
          });
        });

        const total = lines.reduce((a, b) => a + Number(b.amount || 0), 0);

        state.settlements.push({
          id: uid("st"),
          month,
          leaseId: lease.id,
          tenantId: tenant.id,
          tenantName: tenant.name,
          unitId: unit.id,
          unitLabel: unitLabel(unit.id),
          dueDate: dueDateForMonth(month),
          bankAccount: state.settings.bankAccount || "",
          lines,
          total: Number(total.toFixed(2)),
          createdAt: new Date().toISOString()
        });

        created++;
      }

      selectedSettlementId = state.settlements.length ? state.settlements[state.settlements.length - 1].id : null;
      await save();
      alert(`Zapisano ${created} rozliczeń za ${fmtMonth(month)}.`);
      showPage("settlements");
    }

    async function generateMonthlyCharges() {
      const month = currentMonth();
      let created = 0;

      state.leases
        .filter((l) => l.status === "aktywna")
        .forEach((l) => {
          const exists = state.charges.some((c) => c.leaseId === l.id && c.type === `Czynsz ${month}`);
          if (!exists) {
            const unit = state.units.find((u) => u.id === l.unitId);
            const amount = Number(l.rent || 0) + Number(unit?.serviceCharge || 0);
            const due = new Date();
            due.setDate(Number(l.billingDay || 5));
            state.charges.push({
              id: uid("c"),
              leaseId: l.id,
              type: `Czynsz ${month}`,
              amount,
              dueDate: due.toISOString().slice(0, 10),
              status: "oczekujące",
              notes: "Automatycznie wygenerowano"
            });
            created++;

      await save();

    async function generateUtilityCharges() {
      let created = 0;

      state.meters.forEach((m) => {
        const arr = readingsForMeter(m.id);
        if (arr.length < 2) return;

        const prev = arr[arr.length - 2];
        const curr = arr[arr.length - 1];
        const usage = Math.max(0, Number(curr.value) - Number(prev.value));
        const amount = usage * Number(m.rate || 0);

        if (amount <= 0) return;

        const lease = activeLeaseByUnit(m.unitId);
        if (!lease) return;

        state.charges.push({
          id: uid("c"),
          leaseId: lease.id,
          type: `Media: ${m.type}`,
          amount: Number(amount.toFixed(2)),
          dueDate: today(),
          status: "oczekujące",
          notes: `Zużycie ${usage} ${m.unit} × ${m.rate}`
        });
        created++;
      });

      await save();
      alert(`Wygenerowano ${created} opłat za media.`);
    }

    function downloadFile(filename, content, mime) {
      const blob = new Blob([content], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function csv(rows) {
      if (!rows.length) return "";
      const headers = Object.keys(rows[0]);
      const esc = (v) => `"${String(v ?? "").replaceAll('"', '""')}"`;
      return [headers.join(";"), ...rows.map((r) => headers.map((h) => esc(r[h])).join(";"))].join("\n");
    }

        meters: csv(state.meters),
        readings: csv(state.meterReadings),
        settlements: csv(state.settlements),
        charges: csv(state.charges),
        payments: csv(state.payments),
        expenses: csv(state.expenses),
        tickets: csv(state.tickets)
      };

      Object.entries(files).forEach(([name, content], i) => {
        setTimeout(() => downloadFile(`${name}.csv`, content, "text/csv;charset=utf-8;"), i * 250);
      });
    }

    function drawCashflowChart() {
      const canvas = document.getElementById("cashflowChart");
      if (!canvas) return;

      const ctx = canvas.getContext("2d");
      const w = canvas.width = canvas.clientWidth;
      const h = canvas.height = canvas.clientHeight;

      ctx.clearRect(0, 0, w, h);

      const months = [];
      for (let i = 5; i >= 0; i--) {
        const d = new Date();
        d.setMonth(d.getMonth() - i);
        months.push(d.toISOString().slice(0, 7));
      }

      const income = months.map((m) => state.payments.filter((p) => p.date.startsWith(m)).reduce((a, b) => a + Number(b.amount || 0), 0));
      const costs = months.map((m) => state.expenses.filter((e) => e.date.startsWith(m)).reduce((a, b) => a + Number(b.amount || 0), 0));

      const max = Math.max(100, ...income, ...costs);
      const pad = 34;

      ctx.strokeStyle = "rgba(255,255,255,.10)";
      for (let i = 0; i < 5; i++) {
        const y = pad + ((h - pad * 2) / 4) * i;
        ctx.beginPath();
        ctx.moveTo(pad, y);
        ctx.lineTo(w - pad, y);
        ctx.stroke();
      }

      function drawSeries(arr, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        arr.forEach((v, i) => {
          const x = pad + i * ((w - pad * 2) / (arr.length - 1 || 1));
          const y = h - pad - (v / max) * (h - pad * 2);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
      }

      drawSeries(income, "#66e3c4");
      drawSeries(costs, "#ff7272");

      ctx.fillStyle = "#9fb0d0";
      ctx.font = "12px Arial";
      months.forEach((m, i) => {
        const x = pad + i * ((w - pad * 2) / (months.length - 1 || 1));
        ctx.fillText(m.slice(5), x - 8, h - 10);
      });

      ctx.fillStyle = "#66e3c4";
      ctx.fillText("Przychody", pad, 16);
      ctx.fillStyle = "#ff7272";
      ctx.fillText("Koszty", pad + 90, 16);
    }
