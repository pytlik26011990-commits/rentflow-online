<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RentFlow V3 - Logowanie</title>
  <style>
    body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#0a0f1d 0%,#0f1730 100%);color:#eef4ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .wrap{width:100%;max-width:980px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .card{background:#131a2e;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:24px}
    h1,h2{margin-top:0}
    input{width:100%;padding:12px;margin-bottom:12px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:#0d1428;color:#fff}
    button{width:100%;padding:12px;border:none;border-radius:12px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#5ea1ff,#7e8cff);color:#fff}
    .msg{margin-top:10px;color:#ffb3b3;min-height:20px}
    @media (max-width:820px){.wrap{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>RentFlow V3</h1>
      <p>Wersja z logowaniem i PostgreSQL.</p>
      <h2>Logowanie</h2>
      <input id="loginEmail" type="email" placeholder="E-mail" autocomplete="email" />
      <input id="loginPassword" type="password" placeholder="Hasło" autocomplete="current-password" />
      <button onclick="login()">Zaloguj</button>
      <div id="loginMsg" class="msg"></div>
    </div>

    <div class="card">
      <h2>Załóż konto właściciela</h2>
      <input id="regCompany" placeholder="Nazwa firmy / marki" autocomplete="organization" />
      <input id="regName" placeholder="Imię i nazwisko" autocomplete="name" />
      <input id="regEmail" type="email" placeholder="E-mail" autocomplete="email" />
      <input id="regPassword" type="password" placeholder="Hasło (min. 8 znaków)" autocomplete="new-password" />
      <button onclick="registerUser()">Utwórz konto</button>
      <div id="regMsg" class="msg"></div>
    </div>
  </div>

  <script>
    async function postJson(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const text = await response.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch (_) {
        data = { error: text || "Nieznany błąd" };
      }
      if (!response.ok) throw new Error(data.error || "Wystąpił błąd.");
      return data;
    }

    async function login() {
      const loginMsg = document.getElementById("loginMsg");
      loginMsg.textContent = "";
      try {
        await postJson("/api/login", {
          email: document.getElementById("loginEmail").value.trim(),
          password: document.getElementById("loginPassword").value
        });
        location.href = "/";
      } catch (error) {
        loginMsg.textContent = error.message || "Błąd logowania";
      }
    }

    async function registerUser() {
      const regMsg = document.getElementById("regMsg");
      regMsg.textContent = "";
      const password = document.getElementById("regPassword").value;
      if (password.length < 8) {
        regMsg.textContent = "Hasło musi mieć co najmniej 8 znaków.";
        return;
      }
      try {
        await postJson("/api/register", {
          companyName: document.getElementById("regCompany").value.trim(),
          name: document.getElementById("regName").value.trim(),
          email: document.getElementById("regEmail").value.trim(),
          password
        });
        location.href = "/";
      } catch (error) {
        regMsg.textContent = error.message || "Błąd rejestracji";
      }
    }
  </script>
</body>
</html>
